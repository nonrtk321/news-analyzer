<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Political & Legal News Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #181c24;
    --card: #1a1f2e;
    --border: #252d3d;
    --accent: #c8a96e;
    --accent2: #e8c87a;
    --red: #e05252;
    --green: #52c07a;
    --yellow: #e0b84a;
    --blue: #5285e0;
    --text: #e8ecf5;
    --muted: #6b7a9a;
    --label: #8899bb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-sep { color: var(--border); font-size: 18px; }
  .header-title {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── MAIN LAYOUT ── */
  .main { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 48px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .hero-kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--accent); }
  .hero-sub {
    font-size: 14px;
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── INPUT SECTION ── */
  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .input-section label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    min-height: 160px;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .input-row {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .input-row select {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
  }
  .input-row select:focus { border-color: var(--accent); }

  .btn-analyze {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .btn-analyze:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── OUTPUT SECTION ── */
  #output { display: none; }

  /* ── SECTION HEADINGS ── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    margin-top: 40px;
  }
  .section-label .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 3px;
  }
  .section-label h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .section-rule {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── HEADLINE CARD ── */
  .headline-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  .headline-card .hl-kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .headline-card h3 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.35;
  }
  .headline-card .summary-text {
    font-size: 14px;
    color: var(--label);
    line-height: 1.75;
  }
  .hl-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .badge-red    { background: rgba(224,82,82,.15);  color: var(--red);   border: 1px solid rgba(224,82,82,.3); }
  .badge-yellow { background: rgba(224,184,74,.15); color: var(--yellow);border: 1px solid rgba(224,184,74,.3);}
  .badge-green  { background: rgba(82,192,122,.15); color: var(--green); border: 1px solid rgba(82,192,122,.3);}
  .badge-blue   { background: rgba(82,133,224,.15); color: var(--blue);  border: 1px solid rgba(82,133,224,.3);}
  .badge-gold   { background: rgba(200,169,110,.15);color: var(--accent);border: 1px solid rgba(200,169,110,.3);}

  /* ── KEY POINTS ── */
  .key-points {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  .key-points h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .kp-list li {
    display: flex;
    gap: 12px;
    font-size: 14px;
    color: var(--label);
    line-height: 1.65;
  }
  .kp-list li::before {
    content: "▸";
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ── TWO-VIEW ANALYSIS (AI vs Analyst) ── */
  .two-view {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 640px) { .two-view { grid-template-columns: 1fr; } }

  .view-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
  }
  .view-card.ai-view  { border-top: 2px solid var(--blue); }
  .view-card.analyst-view { border-top: 2px solid var(--accent); }

  .view-card .vc-kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ai-view     .vc-kicker { color: var(--blue); }
  .analyst-view .vc-kicker { color: var(--accent); }

  .view-card p {
    font-size: 13.5px;
    color: var(--label);
    line-height: 1.75;
  }

  /* ── VERDICT CARD ── */
  .verdict-card {
    background: linear-gradient(135deg, #1a1f2e 0%, #1e2436 100%);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 26px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .verdict-card::before {
    content: "★";
    position: absolute;
    right: 24px;
    top: 20px;
    font-size: 36px;
    color: rgba(200,169,110,.12);
  }
  .verdict-card .vc-kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .verdict-card p {
    font-size: 14px;
    color: var(--label);
    line-height: 1.75;
  }
  .verdict-highlight {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    line-height: 1.65;
  }

  /* ── STAKEHOLDER TABLE ── */
  .stakeholder-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .stakeholder-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .stakeholder-table td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(37,45,61,.6);
    color: var(--label);
    vertical-align: top;
  }
  .stakeholder-table tr:hover td { background: rgba(255,255,255,.02); }
  .stakeholder-table .name-cell { color: var(--text); font-weight: 600; }

  /* ── IMPACT METER ── */
  .impact-section { margin-bottom: 20px; }
  .impact-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(37,45,61,.5);
  }
  .impact-row:last-child { border-bottom: none; }
  .impact-label {
    font-size: 13px;
    color: var(--label);
    width: 180px;
    flex-shrink: 0;
  }
  .impact-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .impact-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }
  .impact-bar.high   { background: var(--red); }
  .impact-bar.medium { background: var(--yellow); }
  .impact-bar.low    { background: var(--green); }
  .impact-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 36px;
    text-align: right;
  }

  /* ── LOADING ── */
  .loading-overlay {
    display: none;
    text-align: center;
    padding: 48px 0;
  }
  .loading-overlay.active { display: block; }
  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── ERROR ── */
  .error-box {
    background: rgba(224,82,82,.1);
    border: 1px solid rgba(224,82,82,.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    display: none;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 32px;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  footer span { color: var(--accent); }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">Lexis</div>
  <div class="header-sep">|</div>
  <div class="header-title">Thai Political & Legal News Analyzer</div>
</header>

<div class="main">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-kicker">Powered by Claude AI</div>
    <h1>NEWS <span>INTELLIGENCE</span><br>BRIEF</h1>
    <p class="hero-sub">วิเคราะห์ข่าวการเมืองและกฎหมายไทยเชิงลึก — ประเด็นหลัก ผู้มีส่วนเกี่ยวข้อง ผลกระทบ และมุมมองจากหลายแง่</p>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <label for="news-input">▸ วางข้อความข่าวที่ต้องการวิเคราะห์</label>
    <textarea id="news-input" placeholder="วางเนื้อหาข่าว หรือสรุปสั้นๆ ของเรื่องที่ต้องการวิเคราะห์ที่นี่...&#10;&#10;ตัวอย่าง: ศาลรัฐธรรมนูญมีมติรับคำร้องยุบพรรค... / ครม. อนุมัติร่าง พ.ร.บ.... / สส. ยื่นอภิปรายไม่ไว้วางใจ..."></textarea>
    <div class="input-row">
      <select id="news-type">
        <option value="political">🏛️ การเมือง</option>
        <option value="legal">⚖️ กฎหมาย / ศาล</option>
        <option value="legislative">📜 นิติบัญญัติ / ร่าง พ.ร.บ.</option>
        <option value="cabinet">🗂️ ครม. / นโยบาย</option>
        <option value="constitutional">⚖️ รัฐธรรมนูญ</option>
      </select>
      <button class="btn-analyze" id="analyze-btn" onclick="analyzeNews()">Analyze →</button>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <!-- LOADING -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Analyzing · Please wait</div>
  </div>

  <!-- OUTPUT -->
  <div id="output"></div>

</div>

<footer>
  <span>Lexis</span> · Thai Political & Legal News Analyzer · Powered by Claude Sonnet
</footer>

<script>
const SYSTEM_PROMPT = `คุณคือนักวิเคราะห์ข่าวการเมืองและกฎหมายไทย ตอบกลับเป็น JSON เท่านั้น ห้ามมี backtick หรือข้อความอื่นนอก JSON

ใช้โครงสร้างนี้เป๊ะ (ค่าทุกช่องต้องเป็น string หรือ array of string/object ตามที่กำหนด):
{"headline":"หัวข่าวไม่เกิน 10 คำ","category":"ประเภทข่าว","date_context":"บริบทเวลา","urgency":"HIGH|MEDIUM|LOW","summary":"สรุป 2 ประโยค","key_points":["ประเด็น 1","ประเด็น 2","ประเด็น 3","ประเด็น 4"],"stakeholders":[{"name":"ชื่อ","role":"บทบาท","stance":"ท่าที","impact":"HIGH|MEDIUM|LOW"}],"ai_view":"วิเคราะห์เชิงข้อเท็จจริงและกฎหมาย 2 ประโยค","analyst_view":"วิเคราะห์เชิงการเมืองและบริบท 2 ประโยค","verdict":"บทสรุปรวม 2 ประโยค","verdict_highlight":"ประโยคสรุปเด่น 1 ประโยค","impact_areas":[{"area":"ด้านรัฐธรรมนูญ","level":80},{"area":"ด้านการเมือง","level":65},{"area":"ด้านกฎหมาย","level":70},{"area":"ด้านสังคม","level":50},{"area":"ด้านเศรษฐกิจ","level":30}],"watch_out":"สิ่งที่ต้องติดตาม 1-2 ประโยค"}

กฎ: ตอบ JSON เดียว ไม่มีข้อความอื่น ทุก string ต้องปิดด้วย " ทุก array ต้องปิดด้วย ] ทุก object ต้องปิดด้วย }`;

async function analyzeNews() {
  const newsText = document.getElementById('news-input').value.trim();
  const newsType = document.getElementById('news-type').value;
  if (!newsText) return;

  const btn = document.getElementById('analyze-btn');
  const loading = document.getElementById('loading');
  const output = document.getElementById('output');
  const errorBox = document.getElementById('error-box');

  btn.disabled = true;
  loading.classList.add('active');
  output.style.display = 'none';
  errorBox.style.display = 'none';

  const typeLabels = {
    political: 'ข่าวการเมือง',
    legal: 'ข่าวกฎหมาย/ศาล',
    legislative: 'ข่าวนิติบัญญัติ',
    cabinet: 'ข่าว ครม./นโยบาย',
    constitutional: 'ข่าวรัฐธรรมนูญ'
  };

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
  'Content-Type': 'application/json',
  'anthropic-dangerous-direct-browser-access': 'true'
},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: `ประเภทข่าว: ${typeLabels[newsType]}\n\nเนื้อหาข่าว:\n${newsText}`
        }]
      })
    });

    const data = await response.json();

    if (!response.ok || data.error) {
      const errMsg = data.error?.message || JSON.stringify(data);
      throw new Error('API Error: ' + errMsg);
    }

    const raw = data.content?.[0]?.text || '';
    if (!raw) throw new Error('API ตอบกลับว่าง: ' + JSON.stringify(data));

    const clean = raw.replace(/```json|```/g, '').trim();
    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('Claude ตอบว่า: ' + clean.slice(0, 300));
    const result = JSON.parse(clean.slice(start, end + 1));

    renderOutput(result);
    output.style.display = 'block';

  } catch (err) {
    errorBox.textContent = 'เกิดข้อผิดพลาด: ' + (err.message || 'ไม่สามารถวิเคราะห์ได้ กรุณาลองใหม่อีกครั้ง');
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    loading.classList.remove('active');
  }
}

function urgencyBadge(u) {
  const map = { HIGH: 'badge-red', MEDIUM: 'badge-yellow', LOW: 'badge-green' };
  const label = { HIGH: '⚡ HIGH', MEDIUM: '◉ MEDIUM', LOW: '● LOW' };
  return `<span class="badge ${map[u] || 'badge-blue'}">${label[u] || u}</span>`;
}

function impactBadge(i) {
  const map = { HIGH: 'badge-red', MEDIUM: 'badge-yellow', LOW: 'badge-green' };
  return `<span class="badge ${map[i] || 'badge-blue'}">${i}</span>`;
}

function impactClass(level) {
  if (level >= 70) return 'high';
  if (level >= 40) return 'medium';
  return 'low';
}

function renderOutput(d) {
  const output = document.getElementById('output');

  // Stakeholder rows
  const stRows = (d.stakeholders || []).map(s => `
    <tr>
      <td class="name-cell">${s.name}</td>
      <td>${s.role}</td>
      <td>${s.stance}</td>
      <td>${impactBadge(s.impact)}</td>
    </tr>`).join('');

  // Key points
  const kpItems = (d.key_points || []).map(p => `<li>${p}</li>`).join('');

  // Impact bars
  const impactRows = (d.impact_areas || []).map(a => `
    <div class="impact-row">
      <div class="impact-label">${a.area}</div>
      <div class="impact-bar-wrap">
        <div class="impact-bar ${impactClass(a.level)}" style="width:${a.level}%"></div>
      </div>
      <div class="impact-pct">${a.level}%</div>
    </div>`).join('');

  output.innerHTML = `
    <!-- HEADLINE -->
    <div class="section-label" style="margin-top:0;">
      <div class="tag">Headline</div>
      <div class="section-rule"></div>
    </div>
    <div class="headline-card">
      <div class="hl-kicker">${d.category || ''} · ${d.date_context || ''}</div>
      <h3>${d.headline || ''}</h3>
      <p class="summary-text">${d.summary || ''}</p>
      <div class="hl-meta">
        ${urgencyBadge(d.urgency)}
        <span class="badge badge-gold">${d.category || ''}</span>
      </div>
    </div>

    <!-- KEY POINTS -->
    <div class="section-label">
      <div class="tag">Key Points</div>
      <div class="section-rule"></div>
    </div>
    <div class="key-points">
      <h4>▸ ประเด็นสำคัญ</h4>
      <ul class="kp-list">${kpItems}</ul>
    </div>

    <!-- STAKEHOLDERS -->
    <div class="section-label">
      <div class="tag">Stakeholders</div>
      <div class="section-rule"></div>
    </div>
    <div class="headline-card" style="padding:0; overflow:hidden;">
      <table class="stakeholder-table">
        <thead>
          <tr>
            <th>ผู้มีส่วนเกี่ยวข้อง</th>
            <th>บทบาท</th>
            <th>จุดยืน / ท่าที</th>
            <th>ผลกระทบ</th>
          </tr>
        </thead>
        <tbody>${stRows}</tbody>
      </table>
    </div>

    <!-- DUAL VIEW -->
    <div class="section-label">
      <div class="tag">Analysis</div>
      <div class="section-rule"></div>
    </div>
    <div class="two-view">
      <div class="view-card ai-view">
        <div class="vc-kicker">⚡ Claude AI · Factual View</div>
        <p>${d.ai_view || ''}</p>
      </div>
      <div class="view-card analyst-view">
        <div class="vc-kicker">◈ Analyst · Political Context</div>
        <p>${d.analyst_view || ''}</p>
      </div>
    </div>

    <!-- VERDICT -->
    <div class="verdict-card">
      <div class="vc-kicker">★ Combined Verdict · AI + Analyst</div>
      <p>${d.verdict || ''}</p>
      <div class="verdict-highlight">${d.verdict_highlight || ''}</div>
    </div>

    <!-- IMPACT -->
    <div class="section-label">
      <div class="tag">Impact Scale</div>
      <div class="section-rule"></div>
    </div>
    <div class="key-points">
      <h4>▸ ระดับผลกระทบในแต่ละมิติ</h4>
      <div class="impact-section">${impactRows}</div>
    </div>

    <!-- WATCH OUT -->
    ${d.watch_out ? `
    <div class="section-label">
      <div class="tag">Watch Out</div>
      <div class="section-rule"></div>
    </div>
    <div class="headline-card" style="border-left-color: var(--yellow);">
      <div class="hl-kicker">สิ่งที่ต้องติดตามต่อ</div>
      <p class="summary-text">${d.watch_out}</p>
    </div>` : ''}
  `;
}
</script>
</body>
</html>
